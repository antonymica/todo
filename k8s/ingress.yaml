apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: todo-app
  labels:
    app.kubernetes.io/part-of: todo-app
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: 'nginx'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '60'
    # TLS automatique avec cert-manager (Let's Encrypt)
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
spec:
  tls:
    - hosts:
        - todo.antonymica.site
      secretName: todo-tls
  rules:
    - host: todo.antonymica.site
      http:
        paths:
          # Le frontend gère tout — y compris le proxy /api/ via nginx interne
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: todo-app
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: todo-app
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  # ClusterIP = accessible uniquement dans le cluster
  type: ClusterIP

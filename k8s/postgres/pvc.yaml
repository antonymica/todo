apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: todo-app
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: todo-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # Remplace par ta StorageClass selon le cloud provider :
  # AWS  : gp3
  # GCP  : standard-rwo
  # Azure: managed-premium
  # Local (minikube/kind) : standard
  storageClassName: standard

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: todo-app
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: todo-app
spec:
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP
  type: ClusterIP
